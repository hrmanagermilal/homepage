upstream backend {
    server app:9000;
}

# HTTP — redirect all to HTTPS (for production domain)
server {
    listen 80;
    server_name api.milalchurch.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTP — Development on localhost (no redirect)
server {
    listen 80;
    server_name localhost 127.0.0.1 _;

    root /var/www/html/public;
    index index.php index.html index.htm;

    client_max_body_size 12M;

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # FastCGI to PHP-FPM backend
    location ~ \.php$ {
        fastcgi_pass backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        fastcgi_connect_timeout 30s;
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
    }
    
    # Route all requests to index.php
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name api.milalchurch.com;
    
    root /var/www/html/public;
    index index.php index.html index.htm;

    # SSL certificates (self-signed for development)
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    client_max_body_size 12M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # FastCGI to PHP-FPM backend
    location ~ \.php$ {
        fastcgi_pass backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        fastcgi_connect_timeout 30s;
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
    }
    
    # Route all requests to index.php
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
